---
# setup_jumphost_client_tools.yaml
#
# Installs the EVE-NG Windows Client Pack on the Jumphost.
# This is a ONE-TIME infrastructure setup playbook — run manually or after
# a Jumphost rebuild. It is NOT part of the per-booking deploy pipeline.
#
# The client pack registers URI protocol handlers (telnet://, vnc://, capture://)
# so that node clicks in the EVE-NG web UI open the correct local terminal/tool.
#
# Run with:
#   ANSIBLE_CONFIG=/home/auto/NSTE-POC/ansible.cfg \
#   /opt/ansible-venv/bin/ansible-playbook \
#     /etc/ansible/nste/playbooks/setup_jumphost_client_tools.yaml \
#     -i /etc/ansible/nste/hosts.ini \
#     --vault-password-file /etc/ansible/nste/.vault_pass

- name: Install EVE-NG client tools on Jumphost
  hosts: jumphost
  gather_facts: false

  vars_files:
    - /etc/ansible/nste/vault.yaml

  vars:
    # EVE-NG Windows Client Pack 3.0
    # https://www.eve-ng.net/index.php/download/
    eve_ng_client_pack_url: "https://customers.eve-ng.net/EVE-NG-Win-Client-Pack-3.0.exe"
    eve_ng_client_pack_dest: 'C:\Windows\Temp\EVE-NG-Win-Client-Pack-3.0.exe'

    # Sentinel file written after a successful install.
    # Used to make this playbook idempotent — won't re-install if already present.
    eve_ng_install_sentinel: 'C:\ProgramData\EVE-NG\client_pack_installed.flag'

  tasks:

    - name: Check if EVE-NG client pack is already installed
      ansible.windows.win_stat:
        path: "{{ eve_ng_install_sentinel }}"
      register: sentinel_stat

    - name: Download EVE-NG Windows Client Pack 3.0
      ansible.windows.win_get_url:
        url: "{{ eve_ng_client_pack_url }}"
        dest: "{{ eve_ng_client_pack_dest }}"
        force: false                          # skip re-download if file exists
      when: not sentinel_stat.stat.exists

    - name: Install EVE-NG Client Pack silently
      ansible.windows.win_shell: |
        Start-Process -FilePath "{{ eve_ng_client_pack_dest }}" `
          -ArgumentList '/S' `
          -Wait `
          -NoNewWindow
      when: not sentinel_stat.stat.exists
      register: install_result

    - name: Verify installation by checking for a registered URI handler
      ansible.windows.win_reg_stat:
        path: HKLM:\SOFTWARE\Classes\telnet
        name: URL Protocol
      register: telnet_handler
      when: not sentinel_stat.stat.exists

    - name: Fail if URI handler was not registered
      ansible.builtin.fail:
        msg: >
          EVE-NG client pack installed but telnet:// URI handler is missing.
          Check installer logs or run manually on the Jumphost.
      when:
        - not sentinel_stat.stat.exists
        - not telnet_handler.exists

    - name: Write installation sentinel file
      ansible.windows.win_copy:
        content: "{{ ansible_date_time.iso8601 }}"
        dest: "{{ eve_ng_install_sentinel }}"
      when:
        - not sentinel_stat.stat.exists
        - telnet_handler.exists

    - name: Clean up installer
      ansible.windows.win_file:
        path: "{{ eve_ng_client_pack_dest }}"
        state: absent
      when: not sentinel_stat.stat.exists