---
# eve_ng_lab_delete.yaml
# Permanently deletes the EVE-NG lab and all its nodes.
# Runs locally on the RHEL automation VM (connection: local).
#
# Required vault variables (in /etc/ansible/nste/vault.yaml):
#   vault_eve_ng_host      - EVE-NG server IP/hostname
#   vault_eve_ng_username  - EVE-NG admin username
#   vault_eve_ng_password  - EVE-NG admin password
#
# Optional extra vars (override at runtime via -e):
#   eve_ng_lab_path        - Full UNL path on EVE-NG server
#                            Default: /Automation_Topology_POC.unl

- name: EVE-NG | Delete Lab
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    eve_ng_host: "{{ vault_eve_ng_host }}"
    eve_ng_username: "{{ vault_eve_ng_username }}"
    eve_ng_password: "{{ vault_eve_ng_password }}"
    eve_ng_lab_path: "/Automation_Topology_POC.unl"

  tasks:
    - name: Delete lab
      ansible.builtin.command:
        argv:
          - eve-ng
          - --host
          - "{{ eve_ng_host }}"
          - --username
          - "{{ eve_ng_username }}"
          - --password
          - "{{ eve_ng_password }}"
          - lab
          - delete
          - --path
          - "{{ eve_ng_lab_path }}"
      register: delete_result
      no_log: true

    - name: Show delete output
      ansible.builtin.debug:
        msg: "{{ delete_result.stdout_lines }}"
      when: delete_result.stdout_lines | length > 0