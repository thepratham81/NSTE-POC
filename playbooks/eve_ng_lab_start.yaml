---
# eve_ng_lab_start.yaml
# Starts all nodes in the EVE-NG lab.
# Runs locally on the RHEL automation VM (connection: local).

- name: EVE-NG | Start Lab
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - /etc/ansible/nste/vault.yaml

  vars:
    eve_ng_host: "{{ vault_eve_ng_host }}"
    eve_ng_username: "{{ vault_eve_ng_username }}"
    eve_ng_password: "{{ vault_eve_ng_password }}"
    eve_ng_lab_path: "/Automation_Topology_POC.unl"

  tasks:
    - name: Start lab
      ansible.builtin.command:
        argv:
          - eve-ng
          - --host
          - "{{ eve_ng_host }}"
          - --username
          - "{{ eve_ng_username }}"
          - --password
          - "{{ eve_ng_password }}"
          - lab
          - start
          - --path
          - "{{ eve_ng_lab_path }}"
      register: start_result
      no_log: false

    - name: Show start output
      ansible.builtin.debug:
        msg: "{{ start_result.stdout_lines }}"
      when: start_result.stdout_lines | length > 0