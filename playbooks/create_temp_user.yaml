---
# create_temp_user.yaml
# Usage: -e "booking_username=nste-jsmith booking_id=BK-001 booking_user_email=user@example.com"

- name: Create temporary local user on NSTE Jumphost
  hosts: jumphost
  gather_facts: false
  vars_files:
    - /etc/ansible/nste/vault.yaml

  tasks:

    - name: Generate a random password
      ansible.builtin.set_fact:
        temp_password: "{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits,punctuation') }}"

    - name: Create local user account
      ansible.windows.win_user:
        name: "{{ booking_username }}"
        password: "{{ temp_password }}"
        state: present
        password_never_expires: false
        user_cannot_change_password: false
        account_disabled: false
        description: "NSTE temp account | {{ booking_id }}"
        groups:
          - Remote Desktop Users
          - Users
        groups_action: add        # ensures groups are added, not replaced

    - name: Write password to temp file for pipeline to collect
      ansible.builtin.copy:
        content: "{{ temp_password }}"
        dest: /tmp/nste_temp_password.txt
        mode: '0600'
      delegate_to: localhost

    - name: Write email script to temp file
      ansible.builtin.copy:
        dest: /tmp/nste_send_email.py
        mode: '0700'
        content: |
          import smtplib
          from email.mime.text import MIMEText

          body = """Your temporary access to the NSTE Jumphost has been provisioned.

          Booking ID  : {{ booking_id }}
          Username    : {{ booking_username }}
          Password    : {{ temp_password }}
          Jumphost IP : 192.168.171.129
          RDP Port    : 3389

          This account will be automatically deleted at the end of your booking window.
          Please save your work before the booking end time.

          Do not reply to this email."""

          msg = MIMEText(body)
          msg['Subject'] = 'NSTE JIT Access - Booking {{ booking_id }}'
          msg['From'] = '{{ vault_gmail_user }}'
          msg['To'] = '{{ booking_user_email }}'

          server = smtplib.SMTP('smtp.gmail.com', 587)
          server.ehlo()
          server.starttls()
          server.ehlo()
          server.login('{{ vault_gmail_user }}', '{{ vault_gmail_password }}')
          server.sendmail('{{ vault_gmail_user }}', '{{ booking_user_email }}', msg.as_string())
          server.quit()
          print('EMAIL_SENT')
      delegate_to: localhost

    - name: Send access credentials to user via Gmail
      ansible.builtin.shell: python3 /tmp/nste_send_email.py
      delegate_to: localhost
      register: email_result

    - name: Remove email script temp file
      ansible.builtin.file:
        path: /tmp/nste_send_email.py
        state: absent
      delegate_to: localhost

    - name: Confirm email was sent
      ansible.builtin.debug:
        msg: "Email sent successfully to {{ booking_user_email }}"
      when: "'EMAIL_SENT' in email_result.stdout"

    - name: Fail if email was not sent
      ansible.builtin.fail:
        msg: "Email notification failed — check Gmail credentials in vault"
      when: "'EMAIL_SENT' not in email_result.stdout"

    - name: Write email confirmation status file
      ansible.builtin.copy:
        content: "EMAIL_SENT: {{ booking_user_email }} | Booking: {{ booking_id }}"
        dest: /tmp/nste_email_status.txt
        mode: '0600'
      delegate_to: localhost

    - name: Log account creation
      ansible.builtin.debug:
        msg: "Temp account created: {{ booking_username }} | Booking: {{ booking_id }} | Notified: {{ booking_user_email }}"