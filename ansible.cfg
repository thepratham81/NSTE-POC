[defaults]
host_key_checking   = False
retry_files_enabled = False
stdout_callback     = yaml
interpreter_python  = /opt/ansible-venv/bin/python3
collections_path    = /home/auto/.ansible/collections

# Inventory is always passed explicitly — not defined here
# to prevent accidental use of the wrong hosts file

[privilege_escalation]
become        = False
become_method = sudo
