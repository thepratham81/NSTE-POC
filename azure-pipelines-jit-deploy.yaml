# azure-pipelines-jit-deploy.yaml
trigger: none

pool:
  name: NSTE-Deploy

steps:
  - checkout: self
    displayName: 'Checkout NSTE Ansible playbooks from GitHub'

  - task: Bash@3
    displayName: 'Sync playbooks and scripts from GitHub checkout'
    inputs:
      targetType: inline
      script: |
        mkdir -p /etc/ansible/nste/playbooks
        mkdir -p /etc/ansible/nste/scripts
        cp $(System.DefaultWorkingDirectory)/playbooks/*.yaml /etc/ansible/nste/playbooks/
        cp $(System.DefaultWorkingDirectory)/scripts/cleanup_stale_account.sh /etc/ansible/nste/scripts/
        chmod +x /etc/ansible/nste/scripts/cleanup_stale_account.sh

  - task: Bash@3
    displayName: 'Create Temporary JIT Account and Notify User'
    inputs:
      targetType: inline
      script: |
        # Clean up any previous status file
        rm -f /tmp/nste_email_status.txt

        ansible-playbook $(System.DefaultWorkingDirectory)/playbooks/create_temp_user.yaml \
          -i /etc/ansible/nste/hosts.ini \
          --vault-password-file /etc/ansible/nste/.vault_pass \
          -e "booking_username=$(bookingUsername) booking_id=$(bookingId) booking_user_email=$(bookingUserEmail)"

        TEMP_PASS=$(cat /tmp/nste_temp_password.txt)
        echo "##vso[task.setvariable variable=tempPassword;issecret=true]$TEMP_PASS"

        # Write state file — includes booking_user_email so cron job can send revocation email
        echo '{"booking_username":"'$(bookingUsername)'","booking_id":"'$(bookingId)'","end_epoch":'$(bookingEndEpoch)',"booking_user_email":"'$(bookingUserEmail)'"}' \
          > /etc/ansible/nste/active_booking.json

  - task: Bash@3
    displayName: 'Confirm Email Notification Sent'
    inputs:
      targetType: inline
      script: |
        STATUS_FILE="/tmp/nste_email_status.txt"

        if [ -f "$STATUS_FILE" ]; then
          STATUS=$(cat "$STATUS_FILE")
          echo "##[section]Email Confirmation"
          echo "✅ Notification sent successfully"
          echo "   $STATUS"
          rm -f "$STATUS_FILE"
        else
          echo "##vso[task.logissue type=error]Email status file not found — notification may have failed."
          echo "##vso[task.complete result=Failed;]Email confirmation failed."
          exit 1
        fi